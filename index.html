<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>旅行手冊 App</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Babel 以便瀏覽器即時編譯 JSX 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 使用 Import Map 設定 ES Modules 來源 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0?external=react",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
  </script>
  
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    body { -webkit-font-smoothing: antialiased; }
    
    html, body {
      height: 100dvh;
      width: 100vw;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #f3f4f6;
    }
    #root {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body class="bg-gray-100 overflow-hidden">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Home, ListTodo, Map, CalendarDays, Plus, Trash2, CheckSquare, Square, 
      Navigation, Train, Plane, Bus, Car, Footprints, Pencil, PlaneTakeoff, 
      PlaneLanding, Bed, Calendar, MapPin, Save, X, RotateCcw, LogOut, User, Lock, KeyRound, Ship
    } from 'lucide-react';

    // --- Firebase 雲端環境設定 ---
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signOut, signInWithEmailAndPassword, EmailAuthProvider, linkWithCredential } from 'firebase/auth';
    import { getFirestore, doc, onSnapshot, setDoc, updateDoc, arrayUnion } from 'firebase/firestore';

    // 💡 GitHub Pages 部署請在此填入 Firebase 金鑰
    const myFirebaseConfig = {
      apiKey: "AIzaSyCauUYMMq70Nadu4ahrTBkg5WQ0y5xjN98",
      authDomain: "travel-db-479f6.firebaseapp.com",
      projectId: "travel-db-479f6",
      storageBucket: "travel-db-479f6.firebasestorage.app",
      messagingSenderId: "492993282647",
      appId: "1:492993282647:web:0564531043de602a0bd912"
    };

    let app, auth, db, appId;
    const injectedConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
    const isCustomConfigSet = myFirebaseConfig.apiKey && myFirebaseConfig.apiKey !== "請填入您的_API_KEY";
    const isCloudAvailable = injectedConfig || isCustomConfigSet;

    if (isCloudAvailable) {
      try {
        const activeConfig = injectedConfig || myFirebaseConfig;
        app = initializeApp(activeConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        appId = typeof __app_id !== 'undefined' ? __app_id : 'my-custom-travel-app';
      } catch (e) {
        console.error("Firebase 初始化失敗:", e);
      }
    }

    // --- 初始預設範例資料 ---
    const initialTrip = {
      destination: "中國 杭州",
      title: "江南風情：杭州西湖五日遊",
      coverImage: "https://images.unsplash.com/photo-1596484552834-6a58f850e0a1?q=80&w=800&auto=format&fit=crop",
      description: "這是一趟體驗江南水鄉風情的放鬆之旅，我們將漫步於西湖畔，欣賞蘇堤春曉與雷峰夕照，並品嚐道地的西湖醋魚與龍井茶。"
    };

    const initialFlight = {
      outbound: { airline: "長榮航空", flightNumber: "BR 758", departure: { airport: "TPE 桃園", time: "16:25", date: "11/20" }, arrival: { airport: "HGH 蕭山", time: "18:15", date: "11/20" } },
      inbound: { airline: "長榮航空", flightNumber: "BR 757", departure: { airport: "HGH 蕭山", time: "19:30", date: "11/24" }, arrival: { airport: "TPE 桃園", time: "21:25", date: "11/24" } }
    };

    const initialHotels = [
      { id: 1, name: "杭州君悅酒店", checkIn: "11/20", checkOut: "11/24", address: "浙江省杭州市上城區湖濱路28號", nights: 4 }
    ];

    const initialNotes = [
      { id: 1, text: "確認台胞證效期，並辦理好網卡或漫遊" },
      { id: 2, text: "下載並綁定好支付寶 (Alipay) 或微信支付" }
    ];

    const initialPacking = [
      { id: 1, text: "護照與台胞證", packed: false },
      { id: 2, text: "行動電源 & 充電線", packed: true }
    ];

    const initialSummary = [
      { day: 1, date: "11/20 (一)", title: "抵達杭州蕭山機場，前往西湖畔飯店入住" },
      { day: 2, date: "11/21 (二)", title: "漫步蘇堤與白堤，乘船遊西湖" }
    ];

    const initialItinerary = [
      {
        day: 1, activities: [
          { id: 101, time: "18:15", title: "抵達杭州蕭山國際機場", desc: "提領行李", transportToNext: "機場巴士", transportIcon: "bus" }
        ]
      }
    ];

    const renderTransportIcon = (type) => {
      switch (type) {
        case 'train': return <Train size={16} />;
        case 'plane': return <Plane size={16} />;
        case 'bus': return <Bus size={16} />;
        case 'car': return <Car size={16} />;
        case 'walk': return <Footprints size={16} />;
        case 'ship': return <Ship size={16} />;
        default: return <Navigation size={16} />;
      }
    };

    // --- 共用 Loading 畫面元件 ---
    const LoadingScreen = ({ text }) => (
      <div className="w-full h-[100dvh] flex items-center justify-center bg-gray-100 font-sans text-gray-900">
         <div className="flex flex-col items-center gap-4 text-indigo-600 bg-white p-8 rounded-[2rem] shadow-lg border border-gray-100">
            <Navigation size={40} className="animate-bounce" />
            <p className="text-sm font-bold opacity-80 tracking-wider">{text}</p>
         </div>
      </div>
    );

    // --- 登入與註冊畫面元件 ---
    const AuthScreen = ({ appState, onSetup, onLoginAdmin, onGuest, onResetPasscode }) => {
      const [passcode, setPasscode] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      
      // 重設密碼相關狀態
      const [isResetting, setIsResetting] = useState(false);
      const [isMasterVerified, setIsMasterVerified] = useState(false);
      const [masterPasscode, setMasterPasscode] = useState('');
      const [newPasscode, setNewPasscode] = useState('');
      const [confirmPasscode, setConfirmPasscode] = useState('');

      // Email 註冊登入狀態 (改為自訂帳號)
      const [emailMode, setEmailMode] = useState('none'); // 'none' | 'login' | 'register'
      const [username, setUsername] = useState('');
      const [emailPassword, setEmailPassword] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          if (isResetting) {
            if (!isMasterVerified) {
              if (masterPasscode === 'admin0313') {
                setIsMasterVerified(true);
                setError('');
              } else {
                throw new Error('系統安全密碼錯誤，拒絕存取');
              }
            } else {
              if (newPasscode.length < 4) throw new Error('密碼長度至少需要 4 個字元');
              if (newPasscode !== confirmPasscode) throw new Error('兩次輸入的密碼不一致');
              await onResetPasscode(newPasscode);
              setIsResetting(false);
              setIsMasterVerified(false);
              setPasscode('');
              setMasterPasscode('');
              setNewPasscode('');
              setConfirmPasscode('');
              setError('密碼重設成功，請重新登入');
              setTimeout(() => setError(''), 3000);
            }
          } else if (appState === 'setup') {
            if (passcode.length < 4) throw new Error('密碼長度至少需要 4 個字元');
            await onSetup(passcode);
          } else if (appState === 'login') {
            if (!passcode) throw new Error('請輸入管理員密碼');
            await onLoginAdmin(passcode);
          }
        } catch (err) {
          setError(err.message || "發生異常");
        } finally {
          setLoading(false);
        }
      };

      const handleEmailSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        
        // 驗證自訂帳號格式 (例如只能是英數字，至少3碼)
        if (username.length < 3 || !/^[a-zA-Z0-9_]+$/.test(username)) {
           setError("帳號必須為3碼以上的英文字母、數字或底線");
           setLoading(false);
           return;
        }

        // 將自訂帳號轉換成 Firebase 接受的假 Email 格式
        const virtualEmail = `${username}@travelapp.local`;

        try {
          if (emailMode === 'login') {
            await signInWithEmailAndPassword(auth, virtualEmail, emailPassword);
            onGuest(); // 成功後直接以該帳號身分進入
          } else if (emailMode === 'register') {
            // 註冊時，將當前已配發的匿名帳號「綁定」給這個假 Email，保留原本的清單
            const credential = EmailAuthProvider.credential(virtualEmail, emailPassword);
            await linkWithCredential(auth.currentUser, credential);
            onGuest();
          }
        } catch (err) {
          let errorMsg = "發生錯誤，請稍後再試";
          if (err.code === 'auth/email-already-in-use') errorMsg = "此帳號已經被註冊過，請更換一個或切換至登入";
          if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') errorMsg = "帳號或密碼錯誤";
          if (err.code === 'auth/weak-password') errorMsg = "密碼長度至少需要 6 個字元";
          if (err.code === 'auth/credential-already-in-use') errorMsg = "此帳號已與其他身分綁定";
          setError(errorMsg);
          console.error(err);
        } finally {
          setLoading(false);
        }
      };

      const handleCancelReset = () => {
        setIsResetting(false);
        setIsMasterVerified(false);
        setMasterPasscode('');
        setNewPasscode('');
        setConfirmPasscode('');
        setError('');
      };

      return (
        <div className="w-full h-[100dvh] flex flex-col items-center justify-center p-6 bg-gray-100 font-sans text-gray-900 overflow-y-auto">
          <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm border border-gray-100 relative overflow-hidden my-auto">
            <div className="absolute top-0 inset-x-0 h-2 bg-indigo-600"></div>
            <div className="flex justify-center mb-6">
              <div className="bg-indigo-100 p-3 rounded-2xl text-indigo-600">
                {isResetting ? <KeyRound size={32} /> : <Map size={32} />}
              </div>
            </div>
            <h2 className="text-2xl font-bold text-gray-800 mb-2 text-center">
              {isResetting ? '重設管理員密碼' : (appState === 'setup' ? '初始化旅程空間' : '登入旅行手冊')}
            </h2>
            <p className="text-center text-sm text-gray-500 mb-6">
              {isResetting 
                ? (isMasterVerified ? '請設定一組新的密碼' : '請先輸入系統安全密碼以驗證身份') 
                : (appState === 'setup' ? '為這趟旅程設定一組「管理員密碼」' : '輸入密碼以編輯行程，或以訪客身份進入')}
            </p>
            
            {error && <div className={`bg-${error.includes('成功') ? 'emerald' : 'red'}-50 text-${error.includes('成功') ? 'emerald' : 'red'}-500 p-3 rounded-xl text-sm mb-4 border border-${error.includes('成功') ? 'emerald' : 'red'}-100 text-center font-medium`}>{error}</div>}
            
            {emailMode === 'none' && (
              <form onSubmit={handleSubmit} className="space-y-4">
                {isResetting ? (
                  !isMasterVerified ? (
                    <div>
                      <label className="block text-xs font-bold text-gray-500 mb-1 ml-1">系統安全密碼</label>
                      <div className="relative">
                        <Lock size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                        <input type="password" value={masterPasscode} onChange={e=>setMasterPasscode(e.target.value)} className="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-colors" placeholder="請輸入系統安全密碼" />
                      </div>
                    </div>
                  ) : (
                    <>
                      <div>
                        <label className="block text-xs font-bold text-gray-500 mb-1 ml-1">新密碼</label>
                        <div className="relative">
                          <Lock size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                          <input type="password" value={newPasscode} onChange={e=>setNewPasscode(e.target.value)} className="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-colors" placeholder="至少 4 個字元" />
                        </div>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-500 mb-1 ml-1">確認新密碼</label>
                        <div className="relative">
                          <Lock size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                          <input type="password" value={confirmPasscode} onChange={e=>setConfirmPasscode(e.target.value)} className="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-colors" placeholder="再次輸入新密碼" />
                        </div>
                      </div>
                    </>
                  )
                ) : (
                  <div>
                    <label className="block text-xs font-bold text-gray-500 mb-1 ml-1">
                      {appState === 'setup' ? '設定管理員密碼' : '管理員密碼'}
                    </label>
                    <div className="relative">
                      <Lock size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                      <input type="password" value={passcode} onChange={e=>setPasscode(e.target.value)} className="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-colors" placeholder={appState === 'setup' ? "至少 4 個字元" : "請輸入密碼"} />
                    </div>
                  </div>
                )}
                
                <button type="submit" disabled={loading} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition-colors mt-2 shadow-md shadow-indigo-200 flex justify-center">
                  {loading ? <span className="animate-pulse">處理中...</span> : (isResetting ? (isMasterVerified ? '確認重設' : '驗證安全密碼') : (appState === 'setup' ? '創建旅程' : '登入管理員'))}
                </button>
              </form>
            )}

            {appState === 'login' && !isResetting && emailMode === 'none' && (
              <div className="mt-4 text-center">
                <button onClick={() => { setIsResetting(true); setError(''); }} type="button" className="text-xs text-indigo-500 hover:text-indigo-700 font-medium transition-colors">
                  忘記密碼？點此重設
                </button>
              </div>
            )}

            {isResetting && emailMode === 'none' && (
               <div className="mt-4 text-center">
                <button onClick={handleCancelReset} type="button" className="text-xs text-gray-500 hover:text-gray-700 font-medium transition-colors">
                  返回登入
                </button>
              </div>
            )}

            {/* Email 與訪客登入區塊 */}
            {appState === 'login' && !isResetting && (
              <div className="mt-6">
                <div className="relative flex py-2 items-center mb-4">
                  <div className="flex-grow border-t border-gray-200"></div>
                  <span className="flex-shrink-0 mx-4 text-gray-400 text-xs">其他登入方式</span>
                  <div className="flex-grow border-t border-gray-200"></div>
                </div>

                {emailMode === 'none' ? (
                  <div className="space-y-3">
                    <button onClick={() => {setEmailMode('login'); setError('');}} type="button" className="w-full py-3 bg-indigo-50 text-indigo-600 rounded-xl font-bold hover:bg-indigo-100 transition-colors flex items-center justify-center gap-2 text-sm">
                      <User size={18} /> 使用自訂帳號登入 / 註冊
                    </button>
                    <button onClick={onGuest} type="button" className="w-full py-3 bg-white border border-gray-200 text-gray-500 rounded-xl font-bold hover:bg-gray-50 transition-colors flex items-center justify-center gap-2 text-sm">
                      免登入，以匿名訪客進入
                    </button>
                  </div>
                ) : (
                  <form onSubmit={handleEmailSubmit} className="space-y-3 animate-fade-in bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <h3 className="text-sm font-bold text-gray-700 text-center mb-2">
                      {emailMode === 'login' ? '自訂帳號登入' : '註冊自訂帳號以綁定清單'}
                    </h3>
                    <input type="text" value={username} onChange={e=>setUsername(e.target.value)} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="輸入您的專屬帳號 (例如: allen123)" required />
                    <input type="password" value={emailPassword} onChange={e=>setEmailPassword(e.target.value)} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="輸入密碼 (至少6碼)" required />
                    
                    <div className="flex gap-2 pt-1">
                      <button type="submit" disabled={loading} className="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 transition-colors flex justify-center">
                        {loading ? <span className="animate-pulse">處理中...</span> : (emailMode === 'login' ? '登入' : '註冊')}
                      </button>
                      <button type="button" onClick={() => {setEmailMode('none'); setError('');}} className="px-3 bg-gray-200 text-gray-700 rounded-lg text-sm font-bold hover:bg-gray-300 transition-colors">
                        取消
                      </button>
                    </div>
                    
                    <div className="text-center mt-2">
                      <button type="button" onClick={() => {setEmailMode(emailMode === 'login' ? 'register' : 'login'); setError('');}} className="text-xs text-indigo-500 font-medium hover:underline">
                        {emailMode === 'login' ? '沒有帳號？點此註冊' : '已有帳號？點此直接登入'}
                      </button>
                    </div>
                  </form>
                )}
              </div>
            )}
          </div>
        </div>
      );
    };

    // --- 主程式元件 ---
    function App() {
      const [activeTab, setActiveTab] = useState('home');
      
      const [user, setUser] = useState(null);
      const [authInitialized, setAuthInitialized] = useState(false);
      
      // 應用程式狀態：loading(讀取中), setup(首次建立), login(登入/訪客選擇), ready(進入App)
      const [appState, setAppState] = useState('loading'); 
      const [isAdmin, setIsAdmin] = useState(false);
      const [guestMode, setGuestMode] = useState(false);
      const [dbPasscode, setDbPasscode] = useState('');

      const [trip, setTrip] = useState(initialTrip);
      const [flight, setFlight] = useState(initialFlight);
      const [hotels, setHotels] = useState(initialHotels);
      const [notes, setNotes] = useState(initialNotes);
      const [packing, setPacking] = useState(initialPacking);
      const [summary, setSummary] = useState(initialSummary);
      const [itinerary, setItinerary] = useState(initialItinerary);

      const [isPublicDataLoaded, setIsPublicDataLoaded] = useState(false);
      const [isPersonalDataLoaded, setIsPersonalDataLoaded] = useState(false);

      // 將 selectedDay 提升到 App 層級
      const [selectedItineraryDay, setSelectedItineraryDay] = useState(1);

      // (1) 身份驗證初始化 (強制使用匿名登入，永不呼叫 signOut，藉此保留個人清單)
      useEffect(() => {
        if (!isCloudAvailable) {
          setUser({ uid: 'local-user' });
          setAuthInitialized(true);
          setAppState('loaded');
          setIsAdmin(true);
          setIsPublicDataLoaded(true);
          setIsPersonalDataLoaded(true);
          return;
        }

        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (e) {
            console.error("Auth 驗證錯誤:", e);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (u) => {
          setUser(u);
          setAuthInitialized(true);
        });
        return () => unsubscribe();
      }, []);

      // (2) 載入公開共用的雲端資料 (行程大綱)
      useEffect(() => {
        if (!user || !isCloudAvailable) return;
        const sharedDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'travel_app_data', 'main_trip');
        
        const unsubscribe = onSnapshot(sharedDocRef, (docSnap) => {
          if (docSnap.metadata.hasPendingWrites) {
            if (!isPublicDataLoaded) setIsPublicDataLoaded(true);
            return; 
          }

          if (docSnap.exists()) {
            const data = docSnap.data();
            setDbPasscode(data.passcode || '');

            const admins = data.adminIds || [];
            
            // 判斷當前使用者是否為管理員
            if (admins.includes(user.uid)) {
              setIsAdmin(true);
              setAppState('ready');
            } else {
              setIsAdmin(false);
              if (guestMode) {
                setAppState('ready');
              } else {
                setAppState('login');
              }
            }

            setTrip(p => JSON.stringify(p) === JSON.stringify(data.trip) ? p : (data.trip || p));
            setFlight(p => JSON.stringify(p) === JSON.stringify(data.flight) ? p : (data.flight || p));
            setHotels(p => JSON.stringify(p) === JSON.stringify(data.hotels) ? p : (data.hotels || p));

          } else {

            setAppState('setup');
          }
          setIsPublicDataLoaded(true);
        }, (error) => {

          setIsPublicDataLoaded(true);
        });

        return () => unsubscribe();
      }, [user, guestMode]);

        const personalDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'travel_app_data', 'personal_prep');
        
        const unsubscribe = onSnapshot(personalDocRef, (docSnap) => {
          if (docSnap.metadata.hasPendingWrites) {
            if (!isPersonalDataLoaded) setIsPersonalDataLoaded(true);
            return;
          }

          if (docSnap.exists()) {
            const data = docSnap.data();
            setNotes(p => JSON.stringify(p) === JSON.stringify(data.notes) ? p : (data.notes || p));
            setPacking(p => JSON.stringify(p) === JSON.stringify(data.packing) ? p : (data.packing || p));

                      <div className="flex justify-between items-center">
                        <div className="text-center w-20">
                          <div className="text-2xl font-bold text-gray-800">{flight.inbound.departure.time}</div>
                          <div className="text-xs text-gray-500 mt-1">{flight.inbound.departure.airport}</div>
                        </div>
                        <div className="flex-1 px-2 flex flex-col items-center">
                          <div className="text-[10px] text-gray-400 mb-1">{flight.inbound.airline} {flight.inbound.flightNumber}</div>
                          <div className="w-full relative flex items-center">
                            <div className="w-2 h-2 rounded-full border-2 border-orange-200"></div>
                            <div className="flex-1 border-t-2 border-dashed border-orange-200"></div>
                            <Plane size={16} className="text-orange-400 absolute left-1/2 -translate-x-1/2" />
                            <div className="w-2 h-2 rounded-full border-2 border-orange-200 bg-orange-200"></div>
                          </div>
                        </div>
                        <div className="text-center w-20">
                          <div className="text-2xl font-bold text-gray-800">{flight.inbound.arrival.time}</div>
                          <div className="text-xs text-gray-500 mt-1">{flight.inbound.arrival.airport}</div>
                        </div>
                      </div>
                    </div>
                  </>
                )}
              </section>

              {/* 飯店住宿區塊 */}
              <section>
                <div className="flex justify-between items-center mb-3">
                  <h2 className="text-xl font-bold text-gray-800 border-b-2 border-rose-500 inline-block pb-1">住宿飯店</h2>
                  {!isEditingHotels && isAdmin && (
                    <button onClick={() => { setEditHotelsData(hotels); setIsEditingHotels(true); }} className="text-gray-400 hover:text-rose-500 transition-colors bg-white p-1.5 rounded-full shadow-sm border border-gray-100">
                      <Pencil size={16} />
                    </button>
                  )}
                </div>

                {isEditingHotels ? (
                  <div className="bg-white p-4 rounded-xl shadow-md border-2 border-rose-300 animate-fade-in space-y-4">
                    {editHotelsData.map((h, index) => (
                      <div key={h.id} className="relative bg-rose-50/50 p-3 rounded-lg border border-rose-100">
                        <div className="absolute top-2 right-2">
                          <button onClick={() => removeHotel(h.id)} className="text-gray-400 hover:text-red-500 transition-colors bg-white rounded-full p-1 shadow-sm"><Trash2 size={14} /></button>
                        </div>
                        <h4 className="text-xs font-bold text-rose-700 mb-2 flex items-center gap-1"><Bed size={14} /> 飯店 {index + 1}</h4>
                        <div className="space-y-2">
                          <div><label className="text-[10px] text-gray-500 font-bold block mb-0.5">飯店名稱</label><input type="text" value={h.name} onChange={(e) => updateHotelData(h.id, 'name', e.target.value)} className="w-full border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-rose-500 outline-none" /></div>
                          <div className="grid grid-cols-3 gap-2">
                            <div><label className="text-[10px] text-gray-500 font-bold block mb-0.5">入住日期</label><input type="text" value={h.checkIn} onChange={(e) => updateHotelData(h.id, 'checkIn', e.target.value)} className="w-full border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-rose-500 outline-none" /></div>
                            <div><label className="text-[10px] text-gray-500 font-bold block mb-0.5">退房日期</label><input type="text" value={h.checkOut} onChange={(e) => updateHotelData(h.id, 'checkOut', e.target.value)} className="w-full border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-rose-500 outline-none" /></div>
                            <div><label className="text-[10px] text-gray-500 font-bold block mb-0.5">住宿晚數</label><input type="number" value={h.nights} onChange={(e) => updateHotelData(h.id, 'nights', e.target.value)} className="w-full border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-rose-500 outline-none" /></div>
                          </div>
                          <div><label className="text-[10px] text-gray-500 font-bold block mb-0.5">地址</label><input type="text" value={h.address} onChange={(e) => updateHotelData(h.id, 'address', e.target.value)} className="w-full border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-rose-500 outline-none" /></div>
                        </div>
                      </div>
                    ))}
                    
                    <button onClick={handleAddHotel} className="w-full py-2 border-2 border-dashed border-rose-200 text-rose-500 rounded-lg text-xs font-bold flex items-center justify-center gap-1 hover:bg-rose-50 transition-colors"><Plus size={16} /> 新增飯店</button>
                    <div className="flex gap-2 pt-2 border-t border-rose-100">
                      <button onClick={handleSaveHotels} className="flex-1 bg-rose-500 text-white py-2 rounded-lg text-sm font-bold flex justify-center items-center gap-1 hover:bg-rose-600 transition-colors"><Save size={16} /> 儲存住宿</button>
                      <button onClick={() => setIsEditingHotels(false)} className="px-4 py-2 bg-gray-100 text-gray-600 rounded-lg text-sm font-bold hover:bg-gray-200 transition-colors">取消</button>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {hotels.map(h => (
                      <div key={h.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex gap-4">
                        <div className="bg-rose-50 p-3 rounded-xl flex items-center justify-center text-rose-500 h-14 w-14 flex-shrink-0"><Bed size={24} /></div>
                        <div className="flex-1">
                          <h3 className="font-bold text-gray-800 leading-tight">{h.name}</h3>
                          <div className="text-xs text-gray-500 mt-2 flex items-center"><Calendar size={12} className="mr-1" /> {h.checkIn} - {h.checkOut} <span className="ml-1 text-rose-500 font-medium">({h.nights}晚)</span></div>
                          <div className="text-xs text-gray-500 mt-1 flex items-start"><MapPin size={12} className="mr-1 mt-0.5 flex-shrink-0" /> <span className="leading-tight">{h.address}</span></div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </section>
              
              {isAdmin && (
                <div className="pt-6 border-t border-gray-200 flex justify-center pb-6">
                  <button onClick={handleResetData} className="text-xs text-gray-400 hover:text-red-500 flex items-center transition-colors">
                    <RotateCcw size={14} className="mr-1" /> 恢復預設範例資料 (清除雲端儲存)
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      };

      // 2. 準備 (注意事項與清單) - **所有人皆可編輯自己的**
      const PrepTab = () => {
        const [newNote, setNewNote] = useState('');
        const [newPack, setNewPack] = useState('');

        const addNote = () => { if (newNote.trim()) { setNotes([...notes, { id: Date.now(), text: newNote }]); setNewNote(''); } };
        const addPack = () => { if (newPack.trim()) { setPacking([...packing, { id: Date.now(), text: newPack, packed: false }]); setNewPack(''); } };
        const togglePack = (id) => setPacking(packing.map(item => item.id === id ? { ...item, packed: !item.packed } : item));
        const removeNote = (id) => setNotes(notes.filter(n => n.id !== id));
        const removePack = (id) => setPacking(packing.filter(p => p.id !== id));

        return (
          <div className="h-full overflow-y-auto p-6 pb-8 space-y-8 bg-gray-50 animate-fade-in relative">
            <div className="bg-indigo-50 border border-indigo-100 text-indigo-600 text-xs px-3 py-2 rounded-lg flex items-center shadow-sm">
                <User size={14} className="mr-1.5" /> 這是您的個人專屬準備清單，不會與他人共用。
            </div>

            <section>
              <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2"><span className="bg-indigo-100 text-indigo-600 p-1.5 rounded-lg"><Navigation size={20} /></span> 注意事項 / 事前準備</h2>
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <ul className="divide-y divide-gray-100">
                  {notes.map((note, index) => (
                    <li key={note.id} className="p-4 flex justify-between items-start gap-3 hover:bg-gray-50 transition-colors">
                      <span className="text-indigo-500 font-bold mt-0.5">{index + 1}.</span>
                      <span className="flex-1 text-gray-700">{note.text}</span>
                      <button onClick={() => removeNote(note.id)} className="text-gray-300 hover:text-red-500 transition-colors"><Trash2 size={18} /></button>
                    </li>
                  ))}
                </ul>
                <div className="p-3 bg-gray-50 border-t border-gray-100 flex gap-2">
                  <input type="text" value={newNote} onChange={(e) => setNewNote(e.target.value)} placeholder="新增注意事項..." className="flex-1 bg-white px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" onKeyPress={(e) => e.key === 'Enter' && addNote()} />
                  <button onClick={addNote} className="bg-indigo-600 text-white p-2 rounded-lg hover:bg-indigo-700 transition-colors"><Plus size={20} /></button>
                </div>
              </div>
            </section>

            <section>
              <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2"><span className="bg-emerald-100 text-emerald-600 p-1.5 rounded-lg"><ListTodo size={20} /></span> 攜帶物品清單</h2>
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <ul className="divide-y divide-gray-100">
                  {packing.map((item) => (
                    <li key={item.id} className="p-3 flex items-center gap-3 hover:bg-gray-50 transition-colors">
                      <button onClick={() => togglePack(item.id)} className={`flex-shrink-0 transition-colors ${item.packed ? 'text-emerald-500' : 'text-gray-300 hover:text-emerald-400'}`}>
                        {item.packed ? <CheckSquare size={24} /> : <Square size={24} />}
                      </button>
                      <span className={`flex-1 transition-all ${item.packed ? 'text-gray-400 line-through' : 'text-gray-700'}`}>{item.text}</span>
                      <button onClick={() => removePack(item.id)} className="text-gray-300 hover:text-red-500 p-1"><Trash2 size={18} /></button>
                    </li>
                  ))}
                </ul>
                <div className="p-3 bg-gray-50 border-t border-gray-100 flex gap-2">
                  <input type="text" value={newPack} onChange={(e) => setNewPack(e.target.value)} placeholder="新增物品..." className="flex-1 bg-white px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" onKeyPress={(e) => e.key === 'Enter' && addPack()} />
                  <button onClick={addPack} className="bg-emerald-600 text-white p-2 rounded-lg hover:bg-emerald-700 transition-colors"><Plus size={20} /></button>
                </div>
              </div>
            </section>
          </div>
        );
      };

      // 3. 旅程總表
      const SummaryTab = () => {
        const [editingDay, setEditingDay] = useState(null);
        const [editForm, setEditForm] = useState({ date: '', title: '' });
        const [confirmDelete, setConfirmDelete] = useState(null);

        const startEdit = (day) => { setEditingDay(day.day); setEditForm({ date: day.date, title: day.title }); setConfirmDelete(null); };
        const saveEdit = () => { setSummary(summary.map(s => s.day === editingDay ? { ...s, date: editForm.date, title: editForm.title } : s)); setEditingDay(null); };
        const requestDelete = (dayNum) => setConfirmDelete(dayNum);
        const executeDelete = (dayNum) => { handleDeleteDay(dayNum); setConfirmDelete(null); };

        return (
          <div className="h-full overflow-y-auto p-6 pb-8 bg-gray-50 animate-fade-in relative">
            <h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2"><CalendarDays className="text-indigo-600" /> 旅程總表</h2>
            
            {summary.length === 0 ? (
              <div className="text-center text-gray-400 py-10">目前尚無安排天數</div>
            ) : (
              <div className="relative border-l-2 border-indigo-200 ml-4 space-y-6">
                {summary.map((day) => (
                  <div key={day.day} className="relative pl-6">
                    <div className="absolute w-4 h-4 bg-indigo-500 rounded-full -left-[9px] top-4 ring-4 ring-indigo-100"></div>
                    {editingDay === day.day && isAdmin ? (
                      <div className="bg-white p-4 rounded-xl shadow-md border-2 border-indigo-300 animate-fade-in">
                        <div className="mb-3"><label className="text-xs font-bold text-gray-500 mb-1 block">日期 (例如: 11/20 (一))</label><input type="text" value={editForm.date} onChange={e => setEditForm({...editForm, date: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" /></div>
                        <div className="mb-4"><label className="text-xs font-bold text-gray-500 mb-1 block">行程總結標題</label><input type="text" value={editForm.title} onChange={e => setEditForm({...editForm, title: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" /></div>
                        <div className="flex gap-2">
                          <button onClick={saveEdit} className="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-sm font-bold">儲存</button>
                          <button onClick={() => setEditingDay(null)} className="flex-1 bg-gray-100 text-gray-600 py-2 rounded-lg text-sm font-bold">取消</button>
                        </div>
                      </div>
                    ) : (
                      <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 group transition-all hover:border-indigo-200">
                        <div className="flex justify-between items-start mb-1">
                          <div className="text-xs font-bold text-indigo-500 tracking-wider">DAY {day.day} • {day.date}</div>
                          {isAdmin && (
                            <div className="flex gap-1">
                              <button onClick={() => startEdit(day)} className="text-gray-300 hover:text-indigo-500 p-1 transition-colors"><Pencil size={16} /></button>
                              {confirmDelete === day.day ? (
                                <button onClick={() => executeDelete(day.day)} className="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded font-bold animate-pulse">確認刪除?</button>
                              ) : (
                                <button onClick={() => requestDelete(day.day)} className="text-gray-300 hover:text-red-500 p-1 transition-colors"><Trash2 size={16} /></button>
                              )}
                            </div>
                          )}
                        </div>
                        <h3 className="text-gray-800 font-medium">{day.title}</h3>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}

            {isAdmin && (
              <button onClick={handleAddDay} className="mt-8 w-full py-3 border-2 border-dashed border-indigo-300 text-indigo-600 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-indigo-50 transition-colors">
                <Plus size={20} /> 新增一天行程
              </button>
            )}
          </div>
        );
      };

      // 4. 每日細流
      const ItineraryTab = () => {
        const [isAdding, setIsAdding] = useState(false);
        const [newAct, setNewAct] = useState({ time: '', title: '', desc: '', transportToNext: '', transportIcon: 'walk' });
        const [editingActId, setEditingActId] = useState(null);
        const [editActData, setEditActData] = useState({ time: '', title: '', desc: '', transportToNext: '', transportIcon: 'walk' });

        useEffect(() => {
          if (summary.length > 0 && !summary.find(s => s.day === selectedItineraryDay)) { setSelectedItineraryDay(summary[0].day); }
        }, [summary]);

        if (summary.length === 0) {
          return (
            <div className="h-full flex flex-col items-center justify-center bg-gray-50 p-6 text-center">
              <CalendarDays size={48} className="text-gray-300 mb-4" />
              <h2 className="text-xl font-bold text-gray-700 mb-2">尚未建立任何天數</h2>
              <p className="text-gray-500 text-sm mb-6">請先至「總表」頁面新增行程天數，再來規劃每日細流。</p>
            </div>
          );
        }

        const currentSummary = summary.find(s => s.day === selectedItineraryDay) || summary[0];
        const currentDayData = itinerary.find(d => d.day === currentSummary.day) || { day: currentSummary.day, activities: [] };

        const handleAddActivity = () => {
          if (!newAct.title || !newAct.time) return;
          const updatedItinerary = [...itinerary];
          const dayIndex = updatedItinerary.findIndex(d => d.day === currentSummary.day);
          const newActivityItem = { id: Date.now(), ...newAct };

          if (dayIndex !== -1) {
            updatedItinerary[dayIndex].activities.push(newActivityItem);
            updatedItinerary[dayIndex].activities.sort((a, b) => a.time.localeCompare(b.time));
          } else {
            updatedItinerary.push({ day: currentSummary.day, activities: [newActivityItem] });
          }

          setItinerary(updatedItinerary);
          setNewAct({ time: '', title: '', desc: '', transportToNext: '', transportIcon: 'walk' });
          setIsAdding(false);
        };

        const removeActivity = (dayId, actId) => {
          setItinerary(itinerary.map(d => d.day === dayId ? { ...d, activities: d.activities.filter(a => a.id !== actId) } : d));
        };

        const startEditActivity = (act) => { setEditingActId(act.id); setEditActData({ ...act }); };
        const handleSaveEditActivity = () => {
          if (!editActData.title || !editActData.time) return;
          const updatedItinerary = [...itinerary];
          const dayIndex = updatedItinerary.findIndex(d => d.day === currentSummary.day);
          if (dayIndex !== -1) {
            const actIndex = updatedItinerary[dayIndex].activities.findIndex(a => a.id === editingActId);
            if (actIndex !== -1) {
              updatedItinerary[dayIndex].activities[actIndex] = { ...editActData, id: editingActId };
              updatedItinerary[dayIndex].activities.sort((a, b) => a.time.localeCompare(b.time));
            }
          }
          setItinerary(updatedItinerary);
          setEditingActId(null);
        };

        return (
          <div className="flex flex-col h-full bg-gray-50 animate-fade-in relative">
            <div className="bg-white px-4 py-3 shadow-sm z-10 sticky top-0 flex gap-2 overflow-x-auto no-scrollbar">
              {summary.map(day => (
                <button
                  key={day.day}
                  onClick={() => setSelectedItineraryDay(day.day)}
                  className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-bold transition-all ${
                    currentSummary.day === day.day ? 'bg-indigo-600 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'
                  }`}
                >Day {day.day}</button>
              ))}
            </div>

            <div className="flex-1 overflow-y-auto p-4 pb-8">
              <div className="mb-6">
                <h2 className="text-xl font-bold text-gray-800">Day {currentSummary.day} 行程細流</h2>
                <p className="text-gray-500 text-sm mt-1">{currentSummary.date} • {currentSummary.title}</p>
              </div>

              <div className="space-y-0">
                {currentDayData.activities.length === 0 ? (
                  <div className="text-center text-gray-400 py-10 bg-white rounded-2xl border border-dashed border-gray-300">目前尚無安排行程</div>
                ) : (
                  currentDayData.activities.map((act, index) => (
                    <div key={act.id} className="relative">
                      {editingActId === act.id && isAdmin ? (
                        <div className="bg-white rounded-2xl p-4 shadow-md border-2 border-indigo-300 relative z-10 my-2 animate-fade-in">
                          <h4 className="text-sm font-bold text-indigo-800 mb-3 flex items-center gap-1"><Pencil size={16} /> 編輯行程</h4>
                          <div className="space-y-3">
                            <div className="flex gap-3">
                              <input type="time" value={editActData.time} onChange={e => setEditActData({...editActData, time: e.target.value})} className="px-3 py-2 rounded-lg border border-gray-200 text-sm flex-shrink-0" required />
                              <input type="text" placeholder="地點 / 標題" value={editActData.title} onChange={e => setEditActData({...editActData, title: e.target.value})} className="flex-1 min-w-0 px-3 py-2 rounded-lg border border-gray-200 text-sm" required />
                            </div>
                            <textarea placeholder="活動簡介或備註..." value={editActData.desc} onChange={e => setEditActData({...editActData, desc: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm resize-none h-20" />
                            <div className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                              <label className="text-xs font-bold text-gray-500 mb-2 block">前往下一個地點的交通方式 (選填)</label>
                              <div className="flex flex-col sm:flex-row gap-2">
                                <select value={editActData.transportIcon} onChange={e => setEditActData({...editActData, transportIcon: e.target.value})} className="px-2 py-2 rounded-lg border border-gray-200 text-sm bg-white shrink-0">
                                  <option value="walk">步行</option>
                                  <option value="train">火車/地鐵</option>
                                  <option value="bus">巴士</option>
                                  <option value="car">汽車/計程車</option>
                                  <option value="plane">飛機</option>
                                  <option value="ship">船</option>
                                </select>
                                <input type="text" placeholder="例如：搭乘地鐵轉乘公車 (約30分)" value={editActData.transportToNext} onChange={e => setEditActData({...editActData, transportToNext: e.target.value})} className="flex-1 min-w-0 px-3 py-2 rounded-lg border border-gray-200 text-sm bg-white" />
                              </div>
                            </div>
                            <div className="flex gap-2 pt-2">
                              <button onClick={handleSaveEditActivity} className="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 transition-colors">儲存修改</button>
                              <button onClick={() => setEditingActId(null)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-bold hover:bg-gray-300 transition-colors">取消</button>
                            </div>
                          </div>
                        </div>
                      ) : (
                        <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 relative z-10 flex gap-4 group">
                          <div className="flex flex-col items-center"><div className="bg-indigo-50 text-indigo-700 font-bold px-2 py-1 rounded-md text-sm whitespace-nowrap">{act.time}</div></div>
                          <div className="flex-1 pb-1">
                            <h3 className="text-lg font-bold text-gray-800 mb-1 flex justify-between items-start">
                              {act.title}
                              {isAdmin && (
                                <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                  <button onClick={() => startEditActivity(act)} className="text-gray-300 hover:text-indigo-500 p-1"><Pencil size={16} /></button>
                                  <button onClick={() => removeActivity(currentSummary.day, act.id)} className="text-gray-300 hover:text-red-500 p-1"><Trash2 size={16} /></button>
                                </div>
                              )}
                            </h3>
                            {act.desc && <p className="text-gray-600 text-sm leading-relaxed mb-2">{act.desc}</p>}
                          </div>
                        </div>
                      )}

                      {(act.transportToNext || index < currentDayData.activities.length - 1) && editingActId !== act.id && (
                        <div className="relative pl-8 py-3 my-1">
                          <div className="absolute left-[39px] top-0 bottom-0 w-0.5 bg-gray-200 z-0"></div>
                          {act.transportToNext && (
                            <div className="relative z-10 flex items-center gap-3 ml-8 bg-gray-100/80 w-fit px-3 py-1.5 rounded-full text-xs text-gray-600 border border-gray-200/50">
                              <span className="text-indigo-500">{renderTransportIcon(act.transportIcon)}</span>{act.transportToNext}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  ))
                )}
              </div>

              {isAdding && isAdmin ? (
                <div className="mt-6 bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                  <h4 className="text-sm font-bold text-indigo-800 mb-3">新增行程節點</h4>
                  <div className="space-y-3">
                    <div className="flex gap-3">
                      <input type="time" value={newAct.time} onChange={e => setNewAct({...newAct, time: e.target.value})} className="px-3 py-2 rounded-lg border border-gray-200 text-sm flex-shrink-0" required />
                      <input type="text" placeholder="地點 / 標題" value={newAct.title} onChange={e => setNewAct({...newAct, title: e.target.value})} className="flex-1 min-w-0 px-3 py-2 rounded-lg border border-gray-200 text-sm" required />
                    </div>
                    <textarea placeholder="活動簡介或備註..." value={newAct.desc} onChange={e => setNewAct({...newAct, desc: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm resize-none h-20" />
                    <div className="bg-white p-3 rounded-lg border border-gray-200">
                      <label className="text-xs font-bold text-gray-500 mb-2 block">前往下一個地點的交通方式 (選填)</label>
                      <div className="flex flex-col sm:flex-row gap-2">
                        <select value={newAct.transportIcon} onChange={e => setNewAct({...newAct, transportIcon: e.target.value})} className="px-2 py-2 rounded-lg border border-gray-200 text-sm bg-gray-50 shrink-0">
                          <option value="walk">步行</option>
                          <option value="train">火車/地鐵</option>
                          <option value="bus">巴士</option>
                          <option value="car">汽車/計程車</option>
                          <option value="plane">飛機</option>
                          <option value="ship">船</option>
                        </select>
                        <input type="text" placeholder="例如：搭乘地鐵轉乘公車 (約30分)" value={newAct.transportToNext} onChange={e => setNewAct({...newAct, transportToNext: e.target.value})} className="flex-1 min-w-0 px-3 py-2 rounded-lg border border-gray-200 text-sm" />
                      </div>
                    </div>
                    <div className="flex gap-2 pt-2">
                      <button onClick={handleAddActivity} className="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 transition-colors">儲存行程</button>
                      <button onClick={() => setIsAdding(false)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-bold hover:bg-gray-300 transition-colors">取消</button>
                    </div>
                  </div>
                </div>
              ) : (
                isAdmin && (
                  <button onClick={() => setIsAdding(true)} className="mt-6 w-full py-3 border-2 border-dashed border-indigo-300 text-indigo-600 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-indigo-50 transition-colors">
                    <Plus size={20} /> 新增行程節點
                  </button>
                )
              )}
            </div>
          </div>
        );
      };

      const BottomNav = () => (
        <div className="w-full bg-white border-t border-gray-200 flex justify-around items-center pt-2 z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] shrink-0" style={{ paddingBottom: 'calc(0.75rem + env(safe-area-inset-bottom, 0px))' }}>
          {[
            { id: 'home', icon: Home, label: '首頁' },
            { id: 'prep', icon: ListTodo, label: '準備' },
            { id: 'summary', icon: CalendarDays, label: '總表' },
            { id: 'itinerary', icon: Map, label: '細流' },
          ].map((tab) => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center justify-center w-full py-1 space-y-1 transition-colors ${activeTab === tab.id ? 'text-indigo-600' : 'text-gray-400 hover:text-gray-600'}`}>
              <tab.icon size={22} className={activeTab === tab.id ? 'stroke-[2.5px]' : ''} />
              <span className="text-[10px] font-medium">{tab.label}</span>
            </button>
          ))}
        </div>
      );

      return (
        <div className="w-full h-full flex items-center justify-center p-0 sm:p-4 font-sans text-gray-900 bg-gray-100">
          <div className="w-full h-full sm:max-w-[400px] sm:max-h-[850px] bg-white sm:rounded-[2.5rem] sm:shadow-2xl overflow-hidden relative flex flex-col border-0 sm:border-[8px] sm:border-gray-900">
            <div className="hidden sm:block absolute top-0 inset-x-0 h-6 bg-gray-900 rounded-b-3xl w-40 mx-auto z-50"></div>
            
            <div className="flex-1 min-h-0 overflow-hidden relative bg-gray-50 flex flex-col">
              {activeTab === 'home' && <HomeTab />}
              {activeTab === 'prep' && <PrepTab />}
              {activeTab === 'summary' && <SummaryTab />}
              {activeTab === 'itinerary' && <ItineraryTab />}
            </div>

            <BottomNav />
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
