<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>旅行手冊 App</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Babel 以便瀏覽器即時編譯 JSX 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 使用 Import Map 設定 ES Modules 來源 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0?external=react",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
  </script>
  
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    body { -webkit-font-smoothing: antialiased; }
    
    /* 強制鎖定視窗高度，解決手機瀏覽器網址列縮放遮擋底部的問題 */
    html, body {
      height: 100dvh;
      width: 100vw;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #f3f4f6;
    }
    #root {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body class="bg-gray-100 overflow-hidden">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Home, ListTodo, Map, CalendarDays, Plus, Trash2, CheckSquare, Square, 
      Navigation, Train, Plane, Bus, Car, Footprints, Pencil, PlaneTakeoff, 
      PlaneLanding, Bed, Calendar, MapPin, Save, X, RotateCcw
    } from 'lucide-react';

    // --- Firebase 雲端環境設定 ---
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, doc, onSnapshot, setDoc } from 'firebase/firestore';

    // 💡 如果您要將 App 部署到 GitHub Pages 並啟用雲端儲存功能，
    // 請前往 Firebase Console (https://console.firebase.google.com/) 建立專案，
    // 並將您的 Web 應用程式設定 (firebaseConfig) 貼到下方：
    const myFirebaseConfig = {
      apiKey: "請填入您的_API_KEY",
      authDomain: "請填入您的_AUTH_DOMAIN",
      projectId: "請填入您的_PROJECT_ID",
      storageBucket: "請填入您的_STORAGE_BUCKET",
      messagingSenderId: "請填入您的_MESSAGING_SENDER_ID",
      appId: "請填入您的_APP_ID"
    };

    let app, auth, db, appId;
    
    // 自動判斷是在預覽環境，還是您自行部屬的 GitHub Pages 環境
    const injectedConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
    const isCustomConfigSet = myFirebaseConfig.apiKey && myFirebaseConfig.apiKey !== "請填入您的_API_KEY";
    const isCloudAvailable = injectedConfig || isCustomConfigSet;

    if (isCloudAvailable) {
      try {
        const activeConfig = injectedConfig || myFirebaseConfig;
        app = initializeApp(activeConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        // 如果是自行部署，給予一個專屬的 App ID 資料夾名稱
        appId = typeof __app_id !== 'undefined' ? __app_id : 'my-custom-travel-app';
      } catch (e) {
        console.error("Firebase 初始化失敗:", e);
      }
    }

    // --- 初始預設範例資料 (Initial Mock Data) ---
    const initialTrip = {
      destination: "中國 杭州",
      title: "江南風情：杭州西湖五日遊",
      coverImage: "https://images.unsplash.com/photo-1596484552834-6a58f850e0a1?q=80&w=800&auto=format&fit=crop",
      description: "這是一趟體驗江南水鄉風情的放鬆之旅，我們將漫步於西湖畔，欣賞蘇堤春曉與雷峰夕照，並品嚐道地的西湖醋魚與龍井茶。"
    };

    const initialFlight = {
      outbound: {
        airline: "長榮航空",
        flightNumber: "BR 758",
        departure: { airport: "TPE 桃園", time: "16:25", date: "11/20" },
        arrival: { airport: "HGH 蕭山", time: "18:15", date: "11/20" }
      },
      inbound: {
        airline: "長榮航空",
        flightNumber: "BR 757",
        departure: { airport: "HGH 蕭山", time: "19:30", date: "11/24" },
        arrival: { airport: "TPE 桃園", time: "21:25", date: "11/24" }
      }
    };

    const initialHotels = [
      { id: 1, name: "杭州君悅酒店", checkIn: "11/20", checkOut: "11/24", address: "浙江省杭州市上城區湖濱路28號", nights: 4 }
    ];

    const initialNotes = [
      { id: 1, text: "確認台胞證效期，並辦理好網卡或漫遊" },
      { id: 2, text: "下載並綁定好支付寶 (Alipay) 或微信支付" },
      { id: 3, text: "下載高德地圖與滴滴出行 App" }
    ];

    const initialPacking = [
      { id: 1, text: "護照與台胞證", packed: false },
      { id: 2, text: "行動電源 & 充電線", packed: true },
      { id: 3, text: "好走的運動鞋", packed: false }
    ];

    const initialSummary = [
      { day: 1, date: "11/20 (一)", title: "抵達杭州蕭山機場，前往西湖畔飯店入住" },
      { day: 2, date: "11/21 (二)", title: "漫步蘇堤與白堤，乘船遊西湖" },
      { day: 3, date: "11/22 (三)", title: "靈隱寺祈福，龍井茶園品茗" }
    ];

    const initialItinerary = [
      {
        day: 1,
        activities: [
          { id: 101, time: "18:15", title: "抵達杭州蕭山國際機場 (HGH)", desc: "辦理入境手續，提領行李。", transportToNext: "搭乘機場巴士或預約接機 (約 50 分鐘)", transportIcon: "bus" },
          { id: 102, time: "19:30", title: "飯店 Check-in", desc: "抵達飯店辦理入住，放下行李稍作休息。", transportToNext: "步行", transportIcon: "walk" },
          { id: 103, time: "20:00", title: "湖濱步行街 晚餐", desc: "在西湖邊的商圈尋找特色杭幫菜享用晚餐。", transportToNext: "", transportIcon: "" }
        ]
      }
    ];

    // --- 輔助圖示渲染 ---
    const renderTransportIcon = (type) => {
      switch (type) {
        case 'train': return <Train size={16} />;
        case 'plane': return <Plane size={16} />;
        case 'bus': return <Bus size={16} />;
        case 'car': return <Car size={16} />;
        case 'walk': return <Footprints size={16} />;
        default: return <Navigation size={16} />;
      }
    };

    // --- 主程式元件 ---
    function App() {
      const [activeTab, setActiveTab] = useState('home');
      
      // 使用雲端同步的狀態管理
      const [user, setUser] = useState(null);
      const [isDataLoaded, setIsDataLoaded] = useState(false);

      const [trip, setTrip] = useState(initialTrip);
      const [flight, setFlight] = useState(initialFlight);
      const [hotels, setHotels] = useState(initialHotels);
      const [notes, setNotes] = useState(initialNotes);
      const [packing, setPacking] = useState(initialPacking);
      const [summary, setSummary] = useState(initialSummary);
      const [itinerary, setItinerary] = useState(initialItinerary);

      // (1) 登入與身份驗證 (為了雲端綁定)
      useEffect(() => {
        if (!isCloudAvailable) {
          setIsDataLoaded(true);
          return;
        }
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (e) {
            console.error("Auth 驗證錯誤:", e);
            setIsDataLoaded(true);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      // (2) 初次載入雲端資料
      useEffect(() => {
        if (!user) return;
        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'travel_app_data', 'main_sync');
        
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          if (docSnap.metadata.hasPendingWrites) {
            if (!isDataLoaded) setIsDataLoaded(true);
            return; // 忽略本地尚未上傳完成的變更，防止輸入中斷
          }
          if (docSnap.exists()) {
            const data = docSnap.data();
            // 深層比較更新，避免無限迴圈
            setTrip(p => JSON.stringify(p) === JSON.stringify(data.trip) ? p : (data.trip || p));
            setFlight(p => JSON.stringify(p) === JSON.stringify(data.flight) ? p : (data.flight || p));
            setHotels(p => JSON.stringify(p) === JSON.stringify(data.hotels) ? p : (data.hotels || p));
            setNotes(p => JSON.stringify(p) === JSON.stringify(data.notes) ? p : (data.notes || p));
            setPacking(p => JSON.stringify(p) === JSON.stringify(data.packing) ? p : (data.packing || p));
            setSummary(p => JSON.stringify(p) === JSON.stringify(data.summary) ? p : (data.summary || p));
            setItinerary(p => JSON.stringify(p) === JSON.stringify(data.itinerary) ? p : (data.itinerary || p));
          }
          setIsDataLoaded(true);
        }, (error) => {
          console.error("雲端讀取錯誤:", error);
          setIsDataLoaded(true);
        });

        return () => unsubscribe();
      }, [user]);

      // (3) 自動背景存檔到雲端 (Debounce 1.5 秒)
      useEffect(() => {
        if (!user || !isDataLoaded) return;
        const timer = setTimeout(() => {
          const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'travel_app_data', 'main_sync');
          setDoc(docRef, { trip, flight, hotels, notes, packing, summary, itinerary }, { merge: true })
            .catch(err => console.error("雲端儲存錯誤:", err));
        }, 1500);

        return () => clearTimeout(timer);
      }, [trip, flight, hotels, notes, packing, summary, itinerary, user, isDataLoaded]);

      const handleResetData = () => {
        if (window.confirm("確定要重置所有資料嗎？這將會清除雲端的所有修改並還原回預設的杭州範例。")) {
          setTrip(initialTrip);
          setFlight(initialFlight);
          setHotels(initialHotels);
          setNotes(initialNotes);
          setPacking(initialPacking);
          setSummary(initialSummary);
          setItinerary(initialItinerary);
        }
      };

      const handleAddDay = () => {
        const nextDayNum = summary.length > 0 ? summary.length + 1 : 1;
        setSummary([...summary, { day: nextDayNum, date: "未定日期", title: "點擊編輯設定行程標題" }]);
        setItinerary([...itinerary, { day: nextDayNum, activities: [] }]);
      };

      const handleDeleteDay = (dayToDelete) => {
        const newSummary = [];
        const newItinerary = [];
        let newDayCounter = 1;

        summary.forEach(s => {
          if (s.day !== dayToDelete) {
            newSummary.push({ ...s, day: newDayCounter });
            const correspondingItin = itinerary.find(i => i.day === s.day);
            newItinerary.push({ day: newDayCounter, activities: correspondingItin ? correspondingItin.activities : [] });
            newDayCounter++;
          }
        });

        setSummary(newSummary);
        setItinerary(newItinerary);
      };

      // 1. 首頁 (目的地簡介、航班、住宿)
      const HomeTab = () => {
        const [isEditingTitle, setIsEditingTitle] = useState(false);
        const [editTripData, setEditTripData] = useState({
          destination: trip.destination,
          title: trip.title,
        });

        const [isEditingFlight, setIsEditingFlight] = useState(false);
        const [editFlightData, setEditFlightData] = useState(flight);

        const [isEditingHotels, setIsEditingHotels] = useState(false);
        const [editHotelsData, setEditHotelsData] = useState(hotels);

        const handleSaveTitle = () => {
          setTrip({ ...trip, destination: editTripData.destination, title: editTripData.title });
          setIsEditingTitle(false);
        };

        const handleSaveFlight = () => {
          setFlight(editFlightData);
          setIsEditingFlight(false);
        };

        const handleSaveHotels = () => {
          setHotels(editHotelsData);
          setIsEditingHotels(false);
        };

        const handleAddHotel = () => {
          setEditHotelsData([...editHotelsData, { id: Date.now(), name: "", checkIn: "", checkOut: "", address: "", nights: 1 }]);
        };

        const updateHotelData = (id, field, value) => {
          setEditHotelsData(editHotelsData.map(h => h.id === id ? { ...h, [field]: value } : h));
        };

        const removeHotel = (id) => {
          setEditHotelsData(editHotelsData.filter(h => h.id !== id));
        };

        const updateFlightData = (direction, type, field, value) => {
          setEditFlightData(prev => ({
            ...prev, [direction]: { ...prev[direction], [type]: { ...prev[direction][type], [field]: value } }
          }));
        };

        const updateFlightBasic = (direction, field, value) => {
          setEditFlightData(prev => ({ ...prev, [direction]: { ...prev[direction], [field]: value } }));
        };

        return (
          <div className="h-full overflow-y-auto pb-8 animate-fade-in relative">
            
            {/* 雲端儲存狀態指示 */}
            <div className="absolute top-4 left-4 z-50 flex items-center bg-black/30 backdrop-blur px-2 py-1 rounded-full text-white/80 text-[10px] font-medium border border-white/20">
              <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 mr-1.5 shadow-[0_0_5px_rgba(52,211,153,0.8)]"></span> 已連接雲端
            </div>

            {/* 封面區域 */}
            <div className="relative h-64 w-full flex-shrink-0 group">
              <img src={trip.coverImage} alt="Cover" className="w-full h-full object-cover" />
              <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 to-black/20"></div>
              
              {!isEditingTitle && (
                <button 
                  onClick={() => setIsEditingTitle(true)}
                  className="absolute top-4 right-4 bg-white/20 backdrop-blur-sm text-white p-2 rounded-full hover:bg-white/40 transition-colors shadow-sm"
                >
                  <Pencil size={18} />
                </button>
              )}

              <div className="absolute bottom-4 left-4 right-4 text-white">
                {isEditingTitle ? (
                  <div className="bg-white/10 backdrop-blur-md p-4 rounded-xl border border-white/20 shadow-lg animate-fade-in">
                    <div className="mb-3">
                      <label className="text-xs text-white/80 mb-1 block">目的地</label>
                      <input 
                        type="text" 
                        value={editTripData.destination}
                        onChange={(e) => setEditTripData({...editTripData, destination: e.target.value})}
                        className="w-full bg-black/30 border border-white/30 rounded px-2 py-1.5 text-sm text-white focus:outline-none focus:border-white/70"
                        placeholder="例如：中國 杭州"
                      />
                    </div>
                    <div className="mb-4">
                      <label className="text-xs text-white/80 mb-1 block">旅程標題</label>
                      <input 
                        type="text" 
                        value={editTripData.title}
                        onChange={(e) => setEditTripData({...editTripData, title: e.target.value})}
                        className="w-full bg-black/30 border border-white/30 rounded px-2 py-1.5 text-sm text-white focus:outline-none focus:border-white/70"
                        placeholder="例如：杭州西湖江南風情遊"
                      />
                    </div>
                    <div className="flex gap-2">
                      <button onClick={handleSaveTitle} className="flex-1 bg-white text-black py-1.5 rounded text-sm font-bold flex items-center justify-center gap-1">
                        <Save size={14} /> 儲存
                      </button>
                      <button onClick={() => setIsEditingTitle(false)} className="px-3 bg-black/40 border border-white/30 text-white py-1.5 rounded text-sm font-bold flex items-center justify-center gap-1 hover:bg-black/60">
                        <X size={14} /> 取消
                      </button>
                    </div>
                  </div>
                ) : (
                  <>
                    <p className="text-sm font-medium tracking-wider mb-1 opacity-90">{trip.destination}</p>
                    <h1 className="text-3xl font-bold leading-tight">{trip.title}</h1>
                  </>
                )}
              </div>
            </div>
            
            <div className="p-6 space-y-8">
              <section>
                <h2 className="text-xl font-bold text-gray-800 mb-3 border-b-2 border-indigo-500 inline-block pb-1">旅程簡介</h2>
                <p className="text-gray-600 leading-relaxed bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                  {trip.description}
                </p>
              </section>

              {/* 航班資訊區塊 */}
              <section>
                <div className="flex justify-between items-center mb-3">
                  <h2 className="text-xl font-bold text-gray-800 border-b-2 border-sky-500 inline-block pb-1">航班資訊</h2>
                  {!isEditingFlight && (
                    <button 
                      onClick={() => { setEditFlightData(flight); setIsEditingFlight(true); }}
                      className="text-gray-400 hover:text-sky-500 transition-colors bg-white p-1.5 rounded-full shadow-sm border border-gray-100"
                    >
                      <Pencil size={16} />
                    </button>
                  )}
                </div>

                {isEditingFlight ? (
                  <div className="bg-white p-4 rounded-xl shadow-md border-2 border-sky-300 animate-fade-in space-y-5">
                    {/* 去程編輯表單 */}
                    <div>
                      <h3 className="text-sm font-bold text-sky-700 mb-2 border-b border-sky-100 pb-1 flex items-center">
                        <PlaneTakeoff size={14} className="mr-1" /> 去程
                      </h3>
                      <div className="grid grid-cols-2 gap-2 mb-2">
                        <div>
                          <label className="text-[10px] text-gray-500 font-bold block mb-0.5">航空公司</label>
                          <input type="text" value={editFlightData.outbound.airline} onChange={(e) => updateFlightBasic('outbound', 'airline', e.target.value)} className="w-full border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-sky-500 outline-none" placeholder="長榮航空" />
                        </div>
                        <div>
                          <label className="text-[10px] text-gray-500 font-bold block mb-0.5">航班號碼</label>
                          <input type="text" value={editFlightData.outbound.flightNumber} onChange={(e) => updateFlightBasic('outbound', 'flightNumber', e.target.value)} className="w-full border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-sky-500 outline-none" placeholder="BR 758" />
                        </div>
                      </div>
                      <div className="grid grid-cols-3 gap-2 mb-2">
                        <div className="col-span-1">
                          <label className="text-[10px] text-gray-500 font-bold block mb-0.5">出發日期</label>
                          <input type="text" value={editFlightData.outbound.departure.date} onChange={(e) => updateFlightData('outbound', 'departure', 'date', e.target.value)} className="w-full border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-sky-500 outline-none" placeholder="11/20" />
                        </div>
                        <div className="col-span-1">
                          <label className="text-[10px] text-gray-500 font-bold block mb-0.5">出發地(機場)</label>
                          <input type="text" value={editFlightData.outbound.departure.airport} onChange={(e) => updateFlightData('outbound', 'departure', 'airport', e.target.value)} className="w-full border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-sky-500 outline-none" placeholder="TPE 桃園" />
                        </div>
                        <div className="col-span-1">
                          <label className="text-[10px] text-gray-500 font-bold block mb-0.5">起飛時間</label>
                          <input type="time" value={editFlightData.outbound.departure.time} onChange={(e) => updateFlightData('outbound', 'departure', 'time', e.target.value)} className="w-full border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-sky-500 outline-none" />
                        </div>
                      </div>
                      <div className="grid grid-cols-3 gap-2">
                        <div className="col-span-1"></div>
                        <div className="col-span-1">
                          <label className="text-[10px] text-gray-500 font-bold block mb-0.5">目的地(機場)</label>
                          <input type="text" value={editFlightData.outbound.arrival.airport} onChange={(e) => updateFlightData('outbound', 'arrival', 'airport', e.target.value)} className="w-full border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-sky-500 outline-none" placeholder="HGH 蕭山" />
                        </div>
                        <div className="col-span-1">
                          <label className="text-[10px] text-gray-500 font-bold block mb-0.5">降落時間</label>
                          <input type="time" value={editFlightData.outbound.arrival.time} onChange={(e) => updateFlightData('outbound', 'arrival', 'time', e.target.value)} className="w-full border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-sky-500 outline-none" />
                        </div>
                      </div>
                    </div>

                    {/* 回程編輯表單 */}
                    <div>
                      <h3 className="text-sm font-bold text-orange-700 mb-2 border-b border-orange-100 pb-1 flex items-center">
                        <PlaneLanding size={14} className="mr-1" /> 回程
                      </h3>
                      <div className="grid grid-cols-2 gap-2 mb-2">
                        <div>
                          <label className="text-[10px] text-gray-500 font-bold block mb-0.5">航空公司</label>
                          <input type="text" value={editFlightData.inbound.airline} onChange={(e) => updateFlightBasic('inbound', 'airline', e.target.value)} className="w-full border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-orange-500 outline-none" placeholder="長榮航空" />
                        </div>
                        <div>

        const [editActData, setEditActData] = useState({ time: '', title: '', desc: '', transportToNext: '', transportIcon: 'walk' });

        useEffect(() => {

        if (summary.length === 0) {

        const currentSummary = summary.find(s => s.day === selectedDay) || summary[0];
        const currentDayData = itinerary.find(d => d.day === currentSummary.day) || { day: currentSummary.day, activities: [] };

        const handleAddActivity = () => {
          if (!newAct.title || !newAct.time) return;
          
          const updatedItinerary = [...itinerary];
          const dayIndex = updatedItinerary.findIndex(d => d.day === currentSummary.day);
          const newActivityItem = { id: Date.now(), ...newAct };

          if (dayIndex !== -1) {
            updatedItinerary[dayIndex].activities.push(newActivityItem);
            updatedItinerary[dayIndex].activities.sort((a, b) => a.time.localeCompare(b.time));
          } else {
            updatedItinerary.push({ day: currentSummary.day, activities: [newActivityItem] });
          }

          setItinerary(updatedItinerary);
          setNewAct({ time: '', title: '', desc: '', transportToNext: '', transportIcon: 'walk' });
          setIsAdding(false);
        };

        const removeActivity = (dayId, actId) => {
          setItinerary(itinerary.map(d => d.day === dayId ? { ...d, activities: d.activities.filter(a => a.id !== actId) } : d));
        };

        // 啟動編輯模式
        const startEditActivity = (act) => {
          setEditingActId(act.id);
          setEditActData({ ...act });
        };

        // 儲存編輯結果
        const handleSaveEditActivity = () => {
          if (!editActData.title || !editActData.time) return;

          const updatedItinerary = [...itinerary];
          const dayIndex = updatedItinerary.findIndex(d => d.day === currentSummary.day);

          if (dayIndex !== -1) {
            const actIndex = updatedItinerary[dayIndex].activities.findIndex(a => a.id === editingActId);
            if (actIndex !== -1) {
              updatedItinerary[dayIndex].activities[actIndex] = { ...editActData, id: editingActId };
              // 重新根據時間排序
              updatedItinerary[dayIndex].activities.sort((a, b) => a.time.localeCompare(b.time));
            }
          }

          setItinerary(updatedItinerary);
          setEditingActId(null);
        };

        return (
          <div className="flex flex-col h-full bg-gray-50 animate-fade-in">
            <div className="bg-white px-4 py-3 shadow-sm z-10 sticky top-0 flex gap-2 overflow-x-auto no-scrollbar">
              {summary.map(day => (
                <button
                  key={day.day}
                  onClick={() => setSelectedDay(day.day)}
                  className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-bold transition-all ${
                    currentSummary.day === day.day 
                      ? 'bg-indigo-600 text-white shadow-md' 
                      : 'bg-gray-100 text-gray-500 hover:bg-gray-200'
                  }`}
                >
                  Day {day.day}
                </button>
              ))}
            </div>

            <div className="flex-1 overflow-y-auto p-4 pb-8">
              <div className="mb-6">
                <h2 className="text-xl font-bold text-gray-800">Day {currentSummary.day} 行程細流</h2>
                <p className="text-gray-500 text-sm mt-1">{currentSummary.date} • {currentSummary.title}</p>
              </div>

              <div className="space-y-0">
                {currentDayData.activities.length === 0 ? (
                  <div className="text-center text-gray-400 py-10 bg-white rounded-2xl border border-dashed border-gray-300">
                    目前尚無安排行程
                  </div>
                ) : (
                  currentDayData.activities.map((act, index) => (
                    <div key={act.id} className="relative">
                      
                      {/* 判斷是否為編輯模式 */}
                      {editingActId === act.id ? (
                        <div className="bg-white rounded-2xl p-4 shadow-md border-2 border-indigo-300 relative z-10 my-2 animate-fade-in">
                          <h4 className="text-sm font-bold text-indigo-800 mb-3 flex items-center gap-1">
                            <Pencil size={16} /> 編輯行程
                          </h4>
                          <div className="space-y-3">
                            <div className="flex gap-3">
                              <input type="time" value={editActData.time} onChange={e => setEditActData({...editActData, time: e.target.value})} className="px-3 py-2 rounded-lg border border-gray-200 text-sm flex-shrink-0" required />
                              <input type="text" placeholder="地點 / 標題" value={editActData.title} onChange={e => setEditActData({...editActData, title: e.target.value})} className="flex-1 min-w-0 px-3 py-2 rounded-lg border border-gray-200 text-sm" required />
                            </div>
                            <textarea placeholder="活動簡介或備註..." value={editActData.desc} onChange={e => setEditActData({...editActData, desc: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm resize-none h-20" />
                            
                            <div className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                              <label className="text-xs font-bold text-gray-500 mb-2 block">前往下一個地點的交通方式 (選填)</label>
                              <div className="flex flex-col sm:flex-row gap-2">
                                <select value={editActData.transportIcon} onChange={e => setEditActData({...editActData, transportIcon: e.target.value})} className="px-2 py-2 rounded-lg border border-gray-200 text-sm bg-white shrink-0">
                                  <option value="walk">步行</option>
                                  <option value="train">火車/地鐵</option>
                                  <option value="bus">巴士</option>
                                  <option value="car">汽車/計程車</option>
                                  <option value="plane">飛機</option>
                                </select>
                                <input type="text" placeholder="例如：搭乘地鐵轉乘公車 (約30分)" value={editActData.transportToNext} onChange={e => setEditActData({...editActData, transportToNext: e.target.value})} className="flex-1 min-w-0 px-3 py-2 rounded-lg border border-gray-200 text-sm bg-white" />
                              </div>
                            </div>

                            <div className="flex gap-2 pt-2">
                              <button onClick={handleSaveEditActivity} className="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 transition-colors">儲存修改</button>
                              <button onClick={() => setEditingActId(null)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-bold hover:bg-gray-300 transition-colors">取消</button>
                            </div>
                          </div>
                        </div>
                      ) : (
                        <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 relative z-10 flex gap-4 group">
                          <div className="flex flex-col items-center">
                            <div className="bg-indigo-50 text-indigo-700 font-bold px-2 py-1 rounded-md text-sm whitespace-nowrap">
                              {act.time}
                            </div>
                          </div>
                          <div className="flex-1 pb-1">
                            <h3 className="text-lg font-bold text-gray-800 mb-1 flex justify-between items-start">
                              {act.title}
                              <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onClick={() => startEditActivity(act)} className="text-gray-300 hover:text-indigo-500 p-1">
                                  <Pencil size={16} />
                                </button>
                                <button onClick={() => removeActivity(currentSummary.day, act.id)} className="text-gray-300 hover:text-red-500 p-1">
                                  <Trash2 size={16} />
                                </button>
                              </div>
                            </h3>
                            {act.desc && <p className="text-gray-600 text-sm leading-relaxed mb-2">{act.desc}</p>}
                          </div>
                        </div>
                      )}

                      {(act.transportToNext || index < currentDayData.activities.length - 1) && editingActId !== act.id && (
                        <div className="relative pl-8 py-3 my-1">
                          <div className="absolute left-[39px] top-0 bottom-0 w-0.5 bg-gray-200 z-0"></div>
                          {act.transportToNext && (
                            <div className="relative z-10 flex items-center gap-3 ml-8 bg-gray-100/80 w-fit px-3 py-1.5 rounded-full text-xs text-gray-600 border border-gray-200/50">
                              <span className="text-indigo-500">{renderTransportIcon(act.transportIcon)}</span>
                              {act.transportToNext}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  ))
                )}
              </div>

              {isAdding ? (
                <div className="mt-6 bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                  <h4 className="text-sm font-bold text-indigo-800 mb-3">新增行程節點</h4>
                  <div className="space-y-3">
                    <div className="flex gap-3">
                      <input type="time" value={newAct.time} onChange={e => setNewAct({...newAct, time: e.target.value})} className="px-3 py-2 rounded-lg border border-gray-200 text-sm flex-shrink-0" required />
                      <input type="text" placeholder="地點 / 標題" value={newAct.title} onChange={e => setNewAct({...newAct, title: e.target.value})} className="flex-1 min-w-0 px-3 py-2 rounded-lg border border-gray-200 text-sm" required />
                    </div>
                    <textarea placeholder="活動簡介或備註..." value={newAct.desc} onChange={e => setNewAct({...newAct, desc: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm resize-none h-20" />
                    
                    <div className="bg-white p-3 rounded-lg border border-gray-200">
                      <label className="text-xs font-bold text-gray-500 mb-2 block">前往下一個地點的交通方式 (選填)</label>
                      <div className="flex flex-col sm:flex-row gap-2">
                        <select value={newAct.transportIcon} onChange={e => setNewAct({...newAct, transportIcon: e.target.value})} className="px-2 py-2 rounded-lg border border-gray-200 text-sm bg-gray-50 shrink-0">
                          <option value="walk">步行</option>
                          <option value="train">火車/地鐵</option>
                          <option value="bus">巴士</option>
                          <option value="car">汽車/計程車</option>
                          <option value="plane">飛機</option>
                        </select>
                        <input type="text" placeholder="例如：搭乘地鐵轉乘公車 (約30分)" value={newAct.transportToNext} onChange={e => setNewAct({...newAct, transportToNext: e.target.value})} className="flex-1 min-w-0 px-3 py-2 rounded-lg border border-gray-200 text-sm" />
                      </div>
                    </div>

                    <div className="flex gap-2 pt-2">
                      <button onClick={handleAddActivity} className="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 transition-colors">儲存行程</button>
                      <button onClick={() => setIsAdding(false)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-bold hover:bg-gray-300 transition-colors">取消</button>
                    </div>
                  </div>
                </div>
              ) : (
                <button 
                  onClick={() => setIsAdding(true)}
                  className="mt-6 w-full py-3 border-2 border-dashed border-indigo-300 text-indigo-600 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-indigo-50 transition-colors"
                >
                  <Plus size={20} /> 新增行程節點
                </button>
              )}
            </div>
          </div>
        );
      };

      // --- 底部導覽列 ---
      const BottomNav = () => (
        <div 
          className="w-full bg-white border-t border-gray-200 flex justify-around items-center pt-2 z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] shrink-0"
          style={{ paddingBottom: 'calc(0.75rem + env(safe-area-inset-bottom, 0px))' }}
        >
          {[
            { id: 'home', icon: Home, label: '首頁' },
            { id: 'prep', icon: ListTodo, label: '準備' },
            { id: 'summary', icon: CalendarDays, label: '總表' },
            { id: 'itinerary', icon: Map, label: '細流' },
          ].map((tab) => (
            <button
              key={tab.id}
              onClick={() => setActiveTab(tab.id)}
              className={`flex flex-col items-center justify-center w-full py-1 space-y-1 transition-colors ${
                activeTab === tab.id ? 'text-indigo-600' : 'text-gray-400 hover:text-gray-600'
              }`}
            >
              <tab.icon size={22} className={activeTab === tab.id ? 'stroke-[2.5px]' : ''} />
              <span className="text-[10px] font-medium">{tab.label}</span>
            </button>
          ))}
        </div>
      );

      // 若資料尚未從雲端下載完成，顯示讀取畫面
      if (!isDataLoaded) {
        return (
          <div className="w-full h-[100dvh] flex items-center justify-center bg-gray-100 font-sans text-gray-900">
             <div className="flex flex-col items-center gap-4 text-indigo-600 bg-white p-8 rounded-[2rem] shadow-lg border border-gray-100">
                <Navigation size={40} className="animate-bounce" />
                <p className="text-sm font-bold opacity-80 tracking-wider">正在同步您的雲端旅程...</p>
             </div>
          </div>
        );
      }

      return (
        <div className="w-full h-full flex items-center justify-center p-0 sm:p-4 font-sans text-gray-900 bg-gray-100">
          <div className="w-full h-full sm:max-w-[400px] sm:max-h-[850px] bg-white sm:rounded-[2.5rem] sm:shadow-2xl overflow-hidden relative flex flex-col border-0 sm:border-[8px] sm:border-gray-900">
            <div className="hidden sm:block absolute top-0 inset-x-0 h-6 bg-gray-900 rounded-b-3xl w-40 mx-auto z-50"></div>
            
            <div className="flex-1 min-h-0 overflow-hidden relative bg-gray-50 flex flex-col">
              {activeTab === 'home' && <HomeTab />}
              {activeTab === 'prep' && <PrepTab />}
              {activeTab === 'summary' && <SummaryTab />}
              {activeTab === 'itinerary' && <ItineraryTab />}
            </div>

            <BottomNav />
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
